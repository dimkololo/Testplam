<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Image</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    /* Вариант через <img> */
    .fullscreen-img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* cover = обрезает, contain = вписывает */
      display: block;
    }

    /* Вариант через background */
    /* body {
      background: url("IMG_2589.GIF") no-repeat center center;
      background-size: cover;
    } */
  </style>
</head>
<body>
  <!-- Вставь путь к своей картинке -->
  <img src="IMG_2589.GIF" alt="Fullscreen" class="fullscreen-img" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // Делаем мини-приложение во весь экран
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  </script>
</body>
</html>
